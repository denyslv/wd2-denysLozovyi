<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broken Vinyl Club | Music</title>
  <meta
    name="description"
    content="Broken Vinyl Club - Music"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body class="no-js">
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div class="site-frame">
    <header class="site-header">
      <div class="brand-lockup">
        <a class="brand-mark" href="./index.html" aria-label="Broken Vinyl Club homepage">
          <img
            class="brand-mark__image"
            src="./public/images/Logo.png"
            srcset="./public/images/Logo.png 1x, ./public/images/Logo2X.png 2x"
            alt="Broken Vinyl Club logo"
            width="89"
            height="89"
          >
        </a>
        <div class="brand-copy">
          <p class="eyebrow">Music</p>
          <h1>Broken Vinyl Club</h1>
        </div>
      </div>

      <button
        class="menu-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="site-navigation"
      >
        Menu
      </button>

      <nav class="site-nav" id="site-navigation" aria-label="Primary navigation">
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a class="is-active" href="./music.html" aria-current="page">Music</a></li>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <div class="mobile-nav-overlay" id="mobile-nav-overlay" hidden></div>

    <main id="main-content">
      <section class="section-panel page-surface music-page" aria-labelledby="page-title">
        <div class="page-heading">
          <h2 id="page-title">Albums</h2>
        </div>

        <div class="album-grid">
          <article class="album-card">
            <img
              class="album-cover-media"
              src="./public/images/album-art/neon-static-dreams.png"
              alt="Neon Static Dreams album art"
            >
            <h3>Neon Static Dreams</h3>
            <p>2026</p>
          </article>
          <article class="album-card">
            <img
              class="album-cover-media"
              src="./public/images/album-art/midnight-warehouse.png"
              alt="Midnight Warehouse Session album art"
            >
            <h3>Midnight Warehouse Session</h3>
            <p>2025</p>
          </article>
          <article class="album-card">
            <img
              class="album-cover-media"
              src="./public/images/album-art/dust-on-the-needle.png"
              alt="Dust on the Needle album art"
            >
            <h3>Dust on the Needle</h3>
            <p>2024</p>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>Broken Vinyl Club</p>
      <p>Web Design &amp; Development By Denys Lozovyi</p>
      <p>&copy; <span id="current-year">2026</span></p>
    </footer>
  </div>
</body>
</html>
